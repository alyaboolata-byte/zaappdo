name: Build APPX

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build APPX
        run: npm run build

      - name: Upload APPX
        uses: actions/upload-artifact@v4
        with:
          name: ZaappDo-appx
          path: dist/*.appx
          retention-days: 30
